<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Portfolio - Classic Brand Co</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
  <script src="./assets/js/main.js" defer></script>
  <link rel="manifest" href="./manifest.json">
  <style>
    .lightbox { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90%; max-height: 90%; margin: auto; }
  </style>
</head>
<body class="bg-black text-white">
  <div id="site-header"></div>
  <main class="pt-20">
    <section class="py-20 px-6">
      <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-bold mb-4 gold-glow text-center">Portfolio Gallery</h1>
        <p class="text-gray-400 text-center mb-12 max-w-2xl mx-auto">Premium Quality embroidery, printing and labeling from Matugga Center craftsmanship.</p>
        
        <!-- Filter Buttons -->
        <div class="flex flex-wrap gap-4 justify-center mb-12">
          <button class="filter-btn active px-6 py-3 bg-[#f6c14e] text-black font-bold rounded-full text-sm" data-filter="all">All</button>
          <button class="filter-btn px-6 py-3 glass text-white font-bold rounded-full text-sm" data-filter="embroidery">Embroidery</button>
          <button class="filter-btn px-6 py-3 glass text-white font-bold rounded-full text-sm" data-filter="printing">Printing</button>
          <button class="filter-btn px-6 py-3 glass text-white font-bold rounded-full text-sm" data-filter="labeling">Labeling</button>
        </div>

        <!-- Masonry Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 portfolio-grid">
          <div class="portfolio-item embroidery glass rounded-2xl overflow-hidden group cursor-pointer" data-category="embroidery">
            <img src="./assets/img/portfolio/tshirt24.jpg" alt="Premium Corporate Wear Embroidery - Matugga Center Craftsmanship" class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-500">
            <div class="p-6">
              <h3 class="text-xl font-bold mb-2">Corporate Wear</h3>
              <p class="text-gray-400 text-sm">Precision embroidery on high-quality fabrics.</p>
            </div>
          </div>
          <div class="portfolio-item printing glass rounded-2xl overflow-hidden group cursor-pointer" data-category="printing">
            <img src="./assets/img/portfolio/tshirt15.jpg" alt="Event Apparel DTG Printing - Premium Quality Matugga Craftsmanship" class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-500">
            <div class="p-6">
              <h3 class="text-xl font-bold mb-2">Event Apparel</h3>
              <p class="text-gray-400 text-sm">Vibrant DTG printing for special events.</p>
            </div>
          </div>
          <div class="portfolio-item labeling glass rounded-2xl overflow-hidden group cursor-pointer" data-category="labeling">
            <img src="./assets/img/portfolio/full-custom13.jpg" alt="Custom Brand Labeling - Matugga Center Premium Craftsmanship" class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-500">
            <div class="p-6">
              <h3 class="text-xl font-bold mb-2">Custom Branding</h3>
              <p class="text-gray-400 text-sm">Woven labels for luxury brand identity.</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Lightbox Modal -->
  <div id="lightbox" class="lightbox">
    <button onclick="closeLightbox()" class="absolute top-8 right-8 text-3xl text-white hover:text-[#f6c14e]">&times;</button>
    <img id="lightbox-img" src="">
  </div>

  <div id="site-footer"></div>
  
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
  <script>
    // Portfolio Filter + Lightbox
    const filterBtns = document.querySelectorAll('.filter-btn');
    const items = document.querySelectorAll('.portfolio-item');
    
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active', 'bg-[#f6c14e]', 'text-black'));
        btn.classList.add('active', 'bg-[#f6c14e]', 'text-black');
        
        const filter = btn.dataset.filter;
        items.forEach(item => {
          if (filter === 'all' || item.dataset.category === filter) {
            item.style.display = 'block';
            gsap.fromTo(item, {opacity: 0, y: 50}, {opacity: 1, y: 0, duration: 0.5});
          } else {
            item.style.display = 'none';
          }
        });
      });
    });
    
    // Lightbox
    items.forEach(item => {
      item.addEventListener('click', () => {
        document.getElementById('lightbox-img').src = item.querySelector('img').src;
        document.getElementById('lightbox').classList.add('active');
      });
    });
    
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    
    document.addEventListener('click', e => {
      if (e.target.id === 'lightbox') closeLightbox();
    });
  </script>
</body>
</html>
